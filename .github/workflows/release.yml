name: Release

# Автоматически создаёт GitHub Release при пуше тега с версией (например 1.10.0).
# Release notes собираются из сообщений коммитов, добавленных с прошлого тега.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Ближайший предыдущий тег версии на истории (если есть)
          PREV=$(git describe --tags --abbrev=0 --match '[0-9]*.[0-9]*.[0-9]*' "${TAG}^" 2>/dev/null || true)

          {
            echo "## Изменения"
            echo ""
            if [ -n "$PREV" ]; then
              git log --no-merges --pretty=format:'- %s' "${PREV}..${TAG}"
              echo ""
              echo ""
              echo "**Полный список изменений:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            else
              git log --no-merges --pretty=format:'- %s' "${TAG}"
            fi
            echo ""
          } > release_notes.md

          echo "Release notes для ${TAG} (с ${PREV:-начала}):"
          cat release_notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release_notes.md --latest
          else
            gh release create "$TAG" --title "$TAG" --notes-file release_notes.md --latest
          fi
